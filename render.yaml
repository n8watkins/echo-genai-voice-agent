# Render Blueprint for Echo — https://render.com/docs/blueprint-spec
#
# Deploy: Render Dashboard -> New + -> Blueprint -> connect this repo -> Apply.
# Then fill the secret env vars (marked `sync: false`) in the dashboard.
#
# Free-tier reality check: a Free web service spins down after ~15 min idle
# (~1 min cold start) and the workspace shares 750 Free instance-hours/month.
# An UptimeRobot HTTP(s) monitor hitting healthCheckPath every 5 min keeps ONE
# service warm within that budget; keeping several warm 24/7 exhausts the 750h.
services:
  - type: web
    name: echo
    runtime: node
    plan: free
    region: oregon          # Free instances are available here
    branch: master
    buildCommand: npm install && npm run build
    # package.json's "start" hardcodes `-p 3200` for local dev; on Render we must
    # bind to the injected $PORT instead, so call next directly with $PORT.
    startCommand: npx next start -p $PORT
    healthCheckPath: /api/healthz
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "22"          # pin Node 22 LTS (package.json engines: ">=20")
      - key: GEMINI_API_KEY
        sync: false          # required — server demo-key fallback; set in dashboard
      - key: ECHO_MODEL
        sync: false          # optional — default text/tool model id
      - key: TAVILY_API_KEY
        sync: false          # optional — enables the web_search tool (free key at app.tavily.com)
      - key: NEXT_PUBLIC_PICOVOICE_ACCESS_KEY
        sync: false          # optional — enables the on-device wake word
      - key: NEXT_PUBLIC_APP_URL
        sync: false          # set to https://<your-app>.onrender.com after first deploy
